esphome.yaml (env-ai-agent)
substitutions:
  name: env-ai-agent
  friendly_name: "Env AI Agent"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:                       # ✅ 부팅 시 문을 닫힘으로 초기화
    - priority: -100
      then:
        - servo.write:
            id: status_servo
            level: -1.0      # 문 닫힘(0도)
        - binary_sensor.template.publish:
            id: door_state
            state: OFF       # 문 상태 = 닫힘

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

api:

ota:
  - platform: esphome

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  ap:
    ssid: "Env-AI-Fallback"
    password: !secret ap_password
  reboot_timeout: 0s
  power_save_mode: none
  fast_connect: true

captive_portal:

i2c:
  sda: GPIO8
  scl: GPIO9
  scan: true
  frequency: 400kHz
  id: bus_i2c

i2s_audio:
  - id: bus_in
    i2s_lrclk_pin: GPIO41
    i2s_bclk_pin: GPIO42
  - id: bus_out
    i2s_lrclk_pin: GPIO39
    i2s_bclk_pin: GPIO16

microphone:
  - platform: i2s_audio
    id: mic_inmp441
    i2s_audio_id: bus_in
    i2s_din_pin: GPIO38
    adc_type: external
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: left
    pdm: false

speaker:
  - platform: i2s_audio
    id: speaker_out
    i2s_audio_id: bus_out
    i2s_dout_pin: GPIO14
    dac_type: external
    channel: mono
    buffer_duration: 500ms   # 음성 끊김 방지
    timeout: never          # 재생 중 버스 해제 방지

media_player:
  - platform: speaker
    id: media_out
    name: "VA Media Player"
    volume_min: 0.0
    volume_max: 1.0
    buffer_size: 10000
    announcement_pipeline:
      speaker: speaker_out
      num_channels: 1
      sample_rate: 16000
      format: FLAC

voice_assistant:
  id: va
  microphone: mic_inmp441
  media_player: media_out
  use_wake_word: false
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 1.5

rtttl:
  output: buzzer_out
  id: buzzer

button:
  - platform: template
    name: "VA Start Button"
    id: va_start_button
    on_press:
      - rtttl.play: "beep:d=8,o=6,b=120:c"
      - voice_assistant.start:

  # ✅ 문 열기 / 닫기 (Assist 노출 + 별칭으로 음성 사용)
  - platform: template
    name: "Door Open"
    on_press:
      - script.execute: door_open
  - platform: template
    name: "Door Close"
    on_press:
      - script.execute: door_close

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO7
      mode: INPUT_PULLUP
      inverted: true
    name: "Physical VA Button"
    filters:
      - delayed_on: 50ms
    on_press:
      - rtttl.play: "beep:d=8,o=6,b=120:c"
      - voice_assistant.start:

  # ✅ 문 상태 저장 (열림=ON, 닫힘=OFF)
  - platform: template
    name: "Door State"
    id: door_state
    device_class: door

sensor:
  - platform: dht
    pin: GPIO21
    model: DHT22
    temperature:
      name: "Room Temperature"
      id: temp_dht
      filters:
        - or:
            - delta: 0.5
            - heartbeat: 30s
    humidity:
      name: "Room Humidity"
      id: hum_dht
      filters:
        - or:
            - delta: 0.5
            - heartbeat: 30s
    update_interval: 30s

  - platform: bh1750
    i2c_id: bus_i2c
    name: "Room Illumination"
    id: lux_bh
    address: 0x23
    update_interval: 10s
    filters:
      - or:
          - delta: 5.0
          - heartbeat: 10s

text_sensor:
  - platform: template
    name: "Current Environment Summary"
    id: env_summary
    update_interval: 30s
    lambda: |-
      // 온도/습도/조도를 한 문장으로 (LLM이 읽기 쉽게)
      float t = id(temp_dht).state;
      float h = id(hum_dht).state;
      float l = id(lux_bh).state;
      if (std::isnan(t) || std::isnan(h) || std::isnan(l)) {
        return {"Waiting for sensors"};
      }
      char buf[160];
      snprintf(buf, sizeof(buf),
        "Temperature %.1f C, Humidity %.1f percent, Illumination %.0f lux",
        t, h, l);
      return {buf};

switch:
  - platform: gpio
    pin: GPIO48
    id: relay_out
    name: "Main Relay"
    icon: "mdi:power"

light:
  - platform: esp32_rmt_led_strip
    pin: GPIO1
    num_leds: 10
    rgb_order: GRB
    chipset: ws2812
    name: "Status LED Strip"
    id: status_strip

output:
  - platform: ledc
    pin: GPIO40
    id: buzzer_out
    channel: 0            # ✅ 부저: LEDC 채널 0
  - platform: ledc
    pin: GPIO4
    id: servo_pwm
    frequency: 50Hz
    channel: 2            # ✅ 서보: 채널 2 (부저와 분리)

servo:
  - id: status_servo
    output: servo_pwm

number:
  - platform: template
    name: "Servo Position"
    id: servo_position
    min_value: -100
    max_value: 100
    step: 1
    optimistic: true
    set_action:
      - servo.write:
          id: status_servo
          level: !lambda "return x / 100.0;"

script:
  # ✅ 문 열기: 서보 + 상태 동시 갱신
  - id: door_open
    then:
      - servo.write:
          id: status_servo
          level: 1.0      # 180도 (열림)
      - binary_sensor.template.publish:
          id: door_state
          state: ON
  - id: door_close
    then:
      - servo.write:
          id: status_servo
          level: -1.0     # 0도 (닫힘)
      - binary_sensor.template.publish:
          id: door_state
          state: OFF
